<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css">

<style>
body {
    margin:0;
    font-family:'SF Pro Display', sans-serif;
    background:#0a0a0a;
    color:#fff;
}

.admin {
    display:flex;
    height:100vh;
}

.sidebar {
    width:220px;
    background:#111;
    padding:1rem;
}

.sidebar-item {
    padding:10px;
    cursor:pointer;
    margin-bottom:5px;
    border-radius:6px;
}

.sidebar-item.active {
    background:#222;
}

.content {
    flex:1;
    padding:20px;
    overflow-y:auto;
}

.page { display:none; }
.page.active { display:block; }

.item-card {
    display:flex;
    gap:10px;
    padding:10px;
    border:1px solid #333;
    margin-bottom:10px;
    border-radius:8px;
    align-items:center;
}

.item-thumb img {
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:6px;
}

.item-actions button {
    margin-left:5px;
}

input, textarea {
    width:100%;
    margin-bottom:10px;
    padding:8px;
    background:#111;
    color:#fff;
    border:1px solid #333;
}

button {
    padding:8px 12px;
    cursor:pointer;
}

#authGate {
    display:grid;
    place-items:center;
    height:100vh;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authGate">
    <div>
        <h2>Admin Login</h2>
        <input id="login-email" placeholder="Email">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="signInAdmin()">Login</button>
        <p id="authError" style="color:red"></p>
    </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp" style="display:none">
<div class="admin">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-item active" onclick="showPage('dashboard', this)">Dashboard</div>
    <div class="sidebar-item" onclick="showPage('gallery', this)">Gallery</div>
    <div class="sidebar-item" onclick="showPage('designs', this)">Designs</div>
    <div class="sidebar-item" onclick="showPage('blog', this)">Blog</div>
    <div class="sidebar-item" onclick="showPage('about', this)">About</div>
    <div class="sidebar-item" onclick="showPage('messages', this)">Messages</div>
    <div class="sidebar-item" onclick="signOutAdmin()">Logout</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
    <h2>Dashboard</h2>
    <p>Gallery: <span id="stat-gallery">0</span></p>
    <p>Designs: <span id="stat-designs">0</span></p>
    <p>Blog: <span id="stat-blog">0</span></p>
    <p>Messages: <span id="stat-messages">0</span></p>
</div>

<!-- GALLERY -->
<div class="page" id="page-gallery">
    <h2>Gallery</h2>

    <button onclick="toggleForm('galleryForm')">+ Add</button>

    <div id="galleryForm" style="display:none">
        <input id="g-title" placeholder="Title">
        <textarea id="g-desc" placeholder="Description"></textarea>
        <button onclick="saveGallery()">Save</button>
    </div>

    <div id="galleryList"></div>
</div>

<!-- DESIGNS -->
<div class="page" id="page-designs">
    <h2>Designs</h2>

    <button onclick="toggleForm('designsForm')">+ Add</button>

    <div id="designsForm" style="display:none">
        <input id="d-title" placeholder="Title">
        <textarea id="d-desc"></textarea>
        <button onclick="saveDesign()">Save</button>
    </div>

    <div id="designsList"></div>
</div>

<!-- BLOG -->
<div class="page" id="page-blog">
    <h2>Blog</h2>

    <button onclick="toggleForm('blogForm')">+ Add</button>

    <div id="blogForm" style="display:none">
        <input id="b-title" placeholder="Title">
        <textarea id="b-excerpt" placeholder="Excerpt"></textarea>
        <div id="b-editor" style="height:200px;background:#fff"></div>
        <button onclick="saveBlog()">Save</button>
    </div>

    <div id="blogList"></div>
</div>

<!-- ABOUT -->
<div class="page" id="page-about">
    <h2>About Me</h2>

    <input id="a-name" placeholder="Name">
    <input id="a-title" placeholder="Title">
    <input id="a-tagline" placeholder="Tagline">
    <textarea id="a-bio1"></textarea>
    <textarea id="a-bio2"></textarea>
    <input id="a-email" placeholder="Email">

    <button onclick="saveAbout()">Save</button>
</div>

<!-- MESSAGES -->
<div class="page" id="page-messages">
    <h2>Messages</h2>
    <div id="messagesList"></div>
</div>

</div>
</div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script src="./js/admin.js"></script>

</body>
</html>
